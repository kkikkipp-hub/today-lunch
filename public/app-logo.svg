<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#191F28"/>
      <stop offset="50%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#0064FF"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC940"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <!-- 동전 외곽 글로우 -->
  <circle cx="256" cy="256" r="130" fill="#FFB800" opacity="0.2" filter="url(#glow)"/>
  <!-- 동전 -->
  <circle cx="256" cy="256" r="118" fill="url(#coinGrad)"/>
  <circle cx="256" cy="256" r="98" fill="none" stroke="#191F28" stroke-width="4" opacity="0.15"/>
  <!-- 세로 선 (달러 심볼) -->
  <line x1="256" y1="182" x2="256" y2="330" stroke="#191F28" stroke-width="16" stroke-linecap="round"/>
  <!-- S 곡선 위 -->
  <path d="M284 206 Q284 190 256 190 Q228 190 228 210 Q228 228 256 234 Q284 240 284 260 Q284 280 256 280 Q228 280 228 264"
    fill="none" stroke="#191F28" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 별빛 장식 -->
  <circle cx="368" cy="148" r="10" fill="#FFB800" opacity="0.9"/>
  <circle cx="395" cy="192" r="6"  fill="#FFFFFF"  opacity="0.6"/>
  <circle cx="152" cy="168" r="8"  fill="#7B61FF"  opacity="0.8"/>
  <circle cx="128" cy="130" r="4"  fill="#FFB800"  opacity="0.5"/>
  <circle cx="380" cy="370" r="5"  fill="#FFFFFF"  opacity="0.4"/>
</svg>
